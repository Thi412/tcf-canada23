<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — License Keys</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f3f0;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:520px;border:0.5px solid rgba(0,0,0,0.1)}
h1{font-size:18px;font-weight:500;margin-bottom:6px}
.sub{font-size:13px;color:#888;margin-bottom:1.5rem}
label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
input,select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #e0e0e0;font-size:15px;margin-bottom:14px;outline:none;background:#fafafa;color:#1a1a1a}
button{padding:10px 20px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-right:8px;margin-bottom:8px}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{background:#fff;color:#1a1a1a;border:1px solid #e0e0e0}
.result{margin-top:1rem;padding:14px 16px;border-radius:8px;font-size:13px;line-height:1.7;display:none;white-space:pre-wrap;font-family:monospace}
.result.success{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.result.error{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b}
.result.info{background:#eff6ff;border:1px solid #93c5fd;color:#1e3a5f}
.key-display{font-family:monospace;font-size:20px;font-weight:600;letter-spacing:.1em;background:#fff;border:1px solid #86efac;border-radius:6px;padding:8px 12px;margin:8px 0;text-align:center;cursor:pointer;user-select:all}
.divider{border:none;border-top:1px solid #eee;margin:1.5rem 0}
</style>
</head>
<body>
<div class="card">
  <h1>🔑 Admin — License Keys</h1>
  <p class="sub">TCF Canada</p>

  <label>Admin secret</label>
  <input type="password" id="secret" placeholder="ADMIN_SECRET"/>

  <hr class="divider">
  <p style="font-size:13px;font-weight:500;margin-bottom:12px">Generate new key</p>

  <label>Plan</label>
  <select id="plan">
    <option value="basic">API Key — $25</option>
    <option value="pro">Essential — $79</option>
    <option value="personal">Complete — $149</option>
  </select>

  <label>Student email</label>
  <input type="email" id="email" placeholder="student@email.com"/>

  <label>Note (optional)</label>
  <input type="text" id="note" placeholder="e.g. Paid via PayPal"/>

  <button onclick="generateKey()" id="gen-btn">Generate key →</button>

  <hr class="divider">
  <p style="font-size:13px;font-weight:500;margin-bottom:12px">Test a key</p>
  <label>License key to test</label>
  <input type="text" id="test-key" placeholder="XXXX-XXXX-XXXX-XXXX"/>
  <button class="btn-secondary" onclick="testKey()">Test verify →</button>

  <div class="result" id="result"></div>
</div>

<script>
function show(msg, type='info') {
  const r = document.getElementById('result');
  r.className = 'result ' + type;
  r.style.display = 'block';
  r.innerHTML = msg;
}

async function generateKey() {
  const secret = document.getElementById('secret').value.trim();
  const plan = document.getElementById('plan').value;
  const email = document.getElementById('email').value.trim();
  const note = document.getElementById('note').value.trim();
  const btn = document.getElementById('gen-btn');

  if (!secret || !email) { show('Please fill in secret and email.', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Generating...';
  show('Calling /api/generate-key...', 'info');

  try {
    const res = await fetch('/api/generate-key', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret, plan, email, note })
    });
    const data = await res.json();
    console.log('generate-key response:', data);

    if (data.ok) {
      show(`✓ Key generated!\n\nPlan: ${data.plan}\nEmail: ${data.email}\n\n<div class="key-display" onclick="navigator.clipboard.writeText('${data.key}');this.textContent='✓ Copied!'">${data.key}</div>\n<small>Click key to copy</small>`, 'success');
      document.getElementById('test-key').value = data.key;
    } else {
      show('✗ ' + JSON.stringify(data), 'error');
    }
  } catch (e) {
    show('✗ Network error: ' + e.message + '\n\nMake sure you opened this from tcf-canada23.vercel.app/admin-keys.html', 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Generate key →';
}

async function testKey() {
  const key = document.getElementById('test-key').value.trim();
  if (!key) { show('Enter a key to test.', 'error'); return; }

  show('Testing key...', 'info');

  try {
    const res = await fetch('/api/verify-plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ license: key })
    });
    const data = await res.json();
    console.log('verify-plan response:', data);

    if (data.ok) {
      show(`✓ Key is VALID!\n\nPlan: ${data.plan}\nEmail: ${data.email}`, 'success');
    } else {
      show('✗ Key invalid: ' + JSON.stringify(data), 'error');
    }
  } catch (e) {
    show('✗ Error: ' + e.message, 'error');
  }
}
</script>
</body>
</html>
